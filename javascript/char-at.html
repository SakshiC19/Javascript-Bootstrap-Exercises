<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function VerifyCode(){
            var code = document.getElementById("txtCode").value;
            var lblMsg = document.getElementById("lblMsg");
            if(code.charAt(0)=="H"){
                lblMsg.innerHTML = "";
            } else {
                lblMsg.innerHTML = "Code must start with 'H' ".fontcolor('red').fontsize(2);
            }
        }
        
        function VerifyName(){
            var username = document.getElementById("txtName").value;
            var lblName = document.getElementById("lblName");
            if(username.charCodeAt(0)>=65 && username.charCodeAt(0)<=90){
                lblName.innerHTML = "";
            } else {
                lblName.innerHTML = "Name must start with uppercase letter".fontcolor('red').fontsize(2);
            }
        }
    </script>
</head>
<body>
    <dl>
        <dt>Your Name</dt>
        <dd>
            <input type="text" onblur="VerifyName()" id="txtName">
        </dd>
        <dd id="lblName"></dd>
        <dt>Bank IFSC Code</dt>
        <dd>
            <input type="text" onblur="VerifyCode()" placeholder="eg: HDFC00032" id="txtCode"> 
        </dd>
        <dd id="lblMsg"></dd>
    </dl>
</body>
</html>
