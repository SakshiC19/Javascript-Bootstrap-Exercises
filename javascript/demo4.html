<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function bodyload(){
            document.querySelector("img").src="../public/images/headphone.jpg";
            document.querySelector("#btnRegister").value="Register";
            document.querySelector(".btnLogin").value="Login";
        }
    </script>
</head>
<body>
    <body onload="bodyload()">
        <div>
            <img width="100" height="100" border="1">
        </div>
        <div>
            <form name="frmRegister">                                                                        
                <h2>Register</h2>                                       
                <dl>
                    <dt>Name</dt>                                                        
                    <dd><input type="text"></dd>
                    <dt>Email</dt>                                                       
                    <dd><input type="email"></dd>
                </dl>
                <input  id="btnRegister" type="button">                                                    
            </form>
            <div>
                <form name="frmLogin">                                                                   
                    <h2>Login</h2>                                     
                    <input type="text" placeholder="Your email">  <input class="btnLogin" type="button">        
                </form>   
            </div>                
        </div>
</body>
</html>
