<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function ToggleDialog(){
            var dialog= document.querySelector("dialog");
            var checkbox = document.getElementById("toggle");
            if(checkbox.checked==true){
                dialog.open=true;
            }else{
                dialog.open=false;
            }
        }
    </script>
</head>
<body>
    <input onchange="ToggleDialog()" type="checkbox" id="toggle"><label>Show Ads </label>
    <dialog>
        <aside style="width:100px">
            <h4>Ads</h4>
            <img src="../public/images/python.png" width="100" height="100">
        </aside>
    </dialog>
</body>
</html>
