<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function SearchClick(){
            result = prompt("Enter Search String" , "eg:tv,mobile,shoes");
            if(result==null){
                alert("you cancelled..");
            }
            else if(result==''){
                alert('Please provide a product name');
            }
            else {
                document.querySelector("p").innerHTML="You are searching for :" + result;
            }
        }
    </script>
</head>
<body>
    <button onclick="SearchClick()">Search</button>
    <p></p>
</body>
</html>
