<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script>
        function VerifyCard(){
            var card = document.getElementById("txtCard").value; 
            var imgCard = document.getElementById("imgCard");
            if(card.startsWith("4455")){
                imgCard.src = "../public/images/visa.png";
            } else {
                imgCard.src = "../public/images/mastercard.png";
            }
        }
        function VerifySkype(){
            var skype = document.getElementById("txtSkype").value;
            var lblError = document.getElementById("lblError");
            if(skype.endsWith("outlook.com")){
                lblError.innerHTML = "";
            } else {
                lblError.innerHTML = "Invalid Skype Account".fontcolor('red').fontsize(2);
            }
        }
    </script>
</head>
<body class="container-fluid">
    <dl class="mt-2 w-25">
        <dt> Your Card Number </dt>
        <dd>
            <div class="input-group">
                <input type="text" id="txtCard" maxlength="16" onblur="VerifyCard()" class="form-control">
                <img width="70" id="imgCard" class="input-group-text">
            </div>
        </dd>
        <dt>Your Skype Account</dt>
        <dd>
            <input type="text" onblur="VerifySkype()" id="txtSkype" class="form-control">
        </dd>
        <dd id="lblError"></dd>
    </dl>
</body>
</html>
