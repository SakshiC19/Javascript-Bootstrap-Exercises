<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    <script src="../src/scripts/inox.js"></script>
</head>
<body class="container-fluid">
    <div id="btnContainer" class="mt-2">
        <button  data-bs-toggle="modal"  data-bs-target="#book" class="btn btn-primary">Quick Booking</button>
        
    </div>

    <div class="modal fade" id="book">
        <div class="modal-dialog modal-fullscreen">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id = "lblTitle">Quick Booking</h3>
                    <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="d-flex justify-content-between">
                        <div>
                            <select id="lstMovies" class="form-select">
                                <option>Select Movie</option>
                                <option>MARDAANI 3</option>
                                <option>VADH 2</option>
                            </select>
                        </div>
                        <div>
                            <select id="lstCinema" class="form-select">
                                <option>Select Cinema</option>
                                <option>PVR Kolhapur</option>
                                <option>INOX Laxmipuri</option>
                            </select>
                        </div>
                        <div>
                            <select id="lstDate" class="form-select">
                                <option>Select Date</option>
                                <option>Today 29, Jan</option>
                                <option>Tommorow 30, Jan</option>
                            </select>
                        </div>
                        <div>
                            <select id="lstTiming" class="form-select">
                                <option>Select Time</option>
                                <option>10:30 AM</option>
                                <option>10:20 PM</option>
                            </select>
                        </div>
                        <div>
                            <button id="btnBook" onclick="BookClick()" data-bs-dismiss="modal" class="btn btn-info">Book</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="summaryContainer" class="mt-2" style="display:none;">
        <div class="card p-2" style="width:300px;">            
            <div class="card-header">
                <h4 class="bi bi-ticket-detailed"> Booking Summary </h4>
            </div>
            <div class="card-body">
                <img id="imgPoster" class="card-img-top" height="200">
                <dl>
                    <dt>Movie</dt>
                    <dd id="lblMovie"></dd>
                    <dt>Cinema</dt>
                    <dd id="lblCinema"></dd>
                    <dt>Date</dt>
                    <dd id="lblDate"></dd>
                    <dt>Timing</dt>
                    <dd id="lblTiming"></dd>
                </dl>
            </div>
            <div class="card-footer">
                <button  data-bs-target="#book"  data-bs-toggle="modal" class="btn btn-warning bi bi-pen w-100" onclick="ModifyClick()">Modify Booking </button>
            </div>
        </div>
    </div>
</body>
</html>
