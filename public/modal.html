<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</head>
<body class="p-4">
    <button  data-bs-toggle="modal" data-bs-target="#login" class="btn btn-warning">Login</button>
    <button  data-bs-toggle="modal" data-bs-target="#ads" class="btn btn-info">Show Ads</button>
    <div class="modal fade" id="login">       <!-- slight animation when modal appears and closes -->
        <div class="modal-dialog modal-dialog-centered modal-dialog-scrollable">          <!-- dialog is by default hidden hence use "open" attribute  -->
            <div class="modal-content">
                <div class="modal-header">
                    <h2 class="bi bi-person-circle">Register User</h2>
                    <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <dl>
                        <dt>User Name</dt>
                        <dd><input type="text" class="form-control"></dd>
                        <dt>Password</dt>
                        <dd><input type="password" class="form-control"></dd>
                        <dt>User Name</dt>
                        <dd><input type="text" class="form-control"></dd>
                        <dt>Password</dt>
                        <dd><input type="password" class="form-control"></dd>
                        <dt>User Name</dt>
                        <dd><input type="text" class="form-control"></dd>
                        <dt>Password</dt>
                        <dd><input type="password" class="form-control"></dd>
                        <dt>User Name</dt>
                        <dd><input type="text" class="form-control"></dd>
                        <dt>Password</dt>
                        <dd><input type="password" class="form-control"></dd>
                        <dt>User Name</dt>
                        <dd><input type="text" class="form-control"></dd>
                        <dt>Password</dt>
                        <dd><input type="password" class="form-control"></dd>
                    </dl>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-warning">Login</button>
                    <button data-bs-dismiss="modal" class="btn btn-danger mx-2">Cancel</button>  <!--When clicked on cancel button the modal will close-->
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="ads">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Python</h2>
                    <button class="btn btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <img src="./images/python.png" width="100" height="100">
                </div>
            </div>

        </div>
    </div>
</body>
</html>
