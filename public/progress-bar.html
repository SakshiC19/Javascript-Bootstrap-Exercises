<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</head>
<body class="container-fluid mt-2">
    <div class="progress">
        <div class="progress-bar bg-success progress-bar-striped progress-bar-animated" style="width:30%">
            30% completed
        </div>
        <div class="progress-bar bg-warning progress-bar-striped progress-bar-animated" style="width:70%">
            70% completed
        </div>
    </div>
    <button class="btn btn-warning mt-4">
        <span class="spinner-border text-light spinner-border-sm"></span> Loading
    </button>
    <button class="btn btn-success mt-4">
        <span class="spinner-grow text-light spinner-grow-sm"></span> Loading
    </button>
</body>
</html>
