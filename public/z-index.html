<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-index Example</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
    <style>
        div{
            width:300px;
            height:200px;
        }
    </style>
</head>
<body class="p-5">
    <div class="position-relative">
        <img src="./images/a5.jpg" class="position-absolute top-2 start-2 w-100 h-100 z-1 m-5 ps-5">
        <img src="./images/a6.jpg" class="position-absolute top-1 start-1 w-75 h-75 z-2 ms-4 mt-3">
        <img src="./images/a7.jpg" class="position-absolute top-4 start-4 w-100 h-100 z-0 pt-5">
    </div>        
</body>
</html>
