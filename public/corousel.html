<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</head>
<body>
    <div class="carousel active" id="banners" data-bs-ride="carousel">
        <div class="carousel-inner">
            <div class="carousel-item active" data-bs-interval="4000">
                <img src="./images/slide1.png" class="w-100" height="300">
            </div>
            <div class="carousel-item bg-secondary" data-bs-interval="4000">
                <div style="height:350px;" class="d-flex justify-content-center align-items-center">
                    <div>
                        <h2>Register User</h2>
                        <div class="input-group">
                            <input type="text" placeholder="Your email" class="form-control">
                            <button class="btn btn-warning">Register</button>
                        </div>
                    </div>
                    
                </div>
            </div>
            <div class="carousel-item" data-bs-interval="1000">
                <img src="./images/slide2.png" class="w-100" height="300">
            </div>
            <div class="carousel-item" data-bs-interval="7000">
                <img src="./images/slide3.png" class="w-100" height="300">
            </div>
        </div>
            <button class="carousel-control-prev" data-bs-slide="prev" data-bs-target="#banners">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" data-bs-slide="next" data-bs-target="#banners">
                <span class="carousel-control-next-icon"></span>
            </button>
            <div class="carousel-indicators">
                <button  class="active" data-bs-slide-to="0" data-bs-target="#banners"></button>
                <button data-bs-slide-to="1" data-bs-target="#banners"></button>
                <button data-bs-slide-to="2" data-bs-target="#banners"></button>
                <button data-bs-slide-to="3" data-bs-target="#banners"></button>
            </div>
    </div>
</body>
</html>
