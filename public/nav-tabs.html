<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</head>
<body class="p-4">
    <h2>Home</h2>
    <ul class="nav nav-tabs w-25">
        <li class="nav-item"> <a href="#login" data-bs-toggle="tab" class="nav-link active">Login</a> </li>
        <li class="nav-item"><a  href="#register" data-bs-toggle="tab" class="nav-link">Register</a></li>
    </ul>
    <div class="tab-content mt-4">
        <div class="tab-pane active" id="login">
            <dl>
                <dt>User Name</dt>
                <dd><input type="text"></dd>
                <dt>Password</dt>
                <dd><input type="password"></dd>
            </dl>
            <button>Login</button>
        </div>
         <div class="tab-pane" id="register">
            <dl>
                <dt>User Name</dt>
                <dd><input type="text"></dd>
                <dt>Password</dt>
                <dd><input type="password"></dd>
                <dt>Email</dt>
                <dd><input type="email"></dd>
                <dt>Date of Birth</dt>
                <dd><input type="date"></dd>
            </dl>
            <button>Register</button>
        </div>
    </div>
</body>
</html>
