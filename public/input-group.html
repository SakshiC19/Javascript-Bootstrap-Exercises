<!DOCTYPE html>
<html lang="en">
<head>

    <div class="w-25 input-group mt-4">
        <span class="bi input-group-text bi-key-fill"></span>

            <input type="checkbox" >
        </span>
    </div>

    <div class="input-group mt-3 w-25">
        <input type="text" class="form-control"><span class="input-group-text">.00</span>
