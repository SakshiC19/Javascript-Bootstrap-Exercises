<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../node_modules/bootstrap-icons/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../node_modules/bootstrap/dist/css/bootstrap.css">
    <script src="../node_modules/bootstrap/dist/js/bootstrap.bundle.js"></script>
</head>
<body class="p-4 d-flex justify-content-center bg-secondary">
    <form class="border border-2 p-4 mt-4 bg-light rounded rounded-1 shadow w-25">
        <div class="bi bi-person-circle fw-bold text-center fs-5"> Register User</div>
        <div class="mb-3">
            <label class="form-label">User Name</label>
            <div>
                <input type="text" class="form-control">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Password</label>
            <div>
                <input type="password" class="form-control">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Your City</label>
            <div>
                <select class="form-select">
                    <option>Choose Your City</option> 
                    <option>Kolhapur</option>
                </select>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Age</label>
            <div>
                <input class="form-range" type="range" min="15" max="30" value="20">
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Select Gender</label>
            <div>
                <input class="form-check-input" type="radio" name="gender"> <label> Male</label>
                <input class=form-check-input" type="radio" name="gender"> <label> Female</label>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Terms of Service</label>
            <textarea rows="4" class="form-control" disabled >Lorem ipsum dolor sit amet consectetur adipisicing elit. Quod, quasi cum. Architecto, magnam deleniti minus fugiat blanditiis veniam, atque beatae pariatur dignissimos provident reprehenderit, corrupti dolorem? Quibusdam accusantium harum debitis!</textarea>
            <div class="m-2">
                <div class="form-switch">
                    <input type="checkbox" class="form-check-input"> <label> I Accept</label>
                </div>
            </div>
        </div>
        <div>
            <button class="btn btn-warning w-100">Register</button>
        </div>
        
    </form>
    
</body>
</html>
